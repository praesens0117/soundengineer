<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>주파수 귀 훈련 - Light</title>
<style>
    * { box-sizing: border-box; }
    body {
        background: #f2f2f7; /* 밝은 배경[cite: 2] */
        color: #1c1c1e;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        text-align: center;
        padding: 40px 20px; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }
    .container {
        width: 100%; max-width: 420px; background: #ffffff;
        padding: 30px 24px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 25px; color: #000; }
    button { font-family: inherit; font-size: 15px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; }
    button:active { transform: scale(0.97); }
    #playButton {
        width: 100%; background: #0071e3; color: white; padding: 16px; border-radius: 14px;
        margin-bottom: 20px; box-shadow: 0 4px 12px rgba(0, 113, 227, 0.2);
    }
    #buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
    #buttons button { background: #f2f2f7; color: #1c1c1e; border: 1px solid #e5e5ea; padding: 16px 0; border-radius: 12px; }
    #result {
        font-size: 16px; font-weight: 600; padding: 16px; background: #f2f2f7;
        border-radius: 14px; min-height: 56px; display: flex; align-items: center; justify-content: center;
        color: #0071e3; word-break: keep-all;
    }
    #score { margin-top: 20px; font-size: 15px; font-weight: 500; color: #8e8e93; }
</style>
</head>
<body>
<div class="container">
    <h1>주파수 귀 훈련</h1>
    <button id="playButton">문제 재생</button>
    <div id="buttons"></div>
    <div id="result">문제를 재생하세요</div>
    <div id="score">점수: 0 / 0</div>
</div>
<script>
    /* 기존 ear_training.html의 스크립트 로직 동일 적용[cite: 2] */
    const frequencies = [63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];
    let currentFrequency = null, score = 0, total = 0;
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    function playFrequency(freq) {
        if (audioContext.state === 'suspended') audioContext.resume();
        const osc = audioContext.createOscillator(); const gain = audioContext.createGain();
        osc.type = "sine"; osc.frequency.value = freq; osc.connect(gain); gain.connect(audioContext.destination);
        const now = audioContext.currentTime;
        gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.2, now + 0.01); gain.gain.linearRampToValueAtTime(0, now + 1.5);
        osc.start(now); osc.stop(now + 1.5);
    }
    function playRandom() {
        currentFrequency = frequencies[Math.floor(Math.random() * frequencies.length)];
        playFrequency(currentFrequency); document.getElementById("result").innerText = "주파수를 맞춰보세요.";
    }
    function checkAnswer(freq) {
        if (!currentFrequency) return; total++;
        const resEl = document.getElementById("result");
        if (freq === currentFrequency) { score++; resEl.innerText = `🎉 정답! (${currentFrequency} Hz)`; }
        else { resEl.innerText = `❌ 오답! 정답은 ${currentFrequency} Hz`; }
        document.getElementById("score").innerText = `점수: ${score} / ${total}`;
    }
    const container = document.getElementById("buttons");
    frequencies.forEach(freq => {
        const btn = document.createElement("button");
        btn.innerText = freq >= 1000 ? `${freq / 1000} kHz` : `${freq} Hz`;
        btn.onclick = () => checkAnswer(freq); container.appendChild(btn);
    });
    document.getElementById("playButton").onclick = playRandom;
</script>
</body>
</html>
